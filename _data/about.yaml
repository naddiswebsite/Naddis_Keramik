text_de:
- Mein Name ist Nadia Mussner, ich bin im Jahr 2000 geboren und lebe in Gröden.
- Nach meiner Matura an der Kunstschule besuchte ich die Ortweinschule in Graz, wo
  ich die Meisterklasse für Kunst und Design mit Schwerpunkt Keramikmodellierung absolvierte.
  Seitdem bin ich in mein Heimatdorf Wolkenstein in Gröden zurückgekehrt, wo ich nun
  an meinen Werken arbeite.
- Die Natur und alltägliche Erfahrungen sind die wichtigsten Inspirationsquellen für
  meine Arbeit. Mit meinen Arbeiten strebe ich ein Gleichgewicht zwischen Funktionalität,
  Materialität und künstlerischem Ausdruck an.
- Mein Schaffen konzentriert sich in erster Linie auf einzigartige Keramikobjekte,
  daneben kommen ausgewählte Kooperationen und Auftragsarbeiten hinzu.
text_it:
- Mi chiamo Nadia Mussner, sono nata nell'anno 2000 e vivo in Val Gardena.
- Dopo essermi maturata al liceo artistico, ho imparato il mio mestiere all'Ortweinschule
  di Graz, frequentando il corso di perfezionamento in arte e design nella modellazione
  della ceramica. Da allora sono tornata nel mio paese natale, Selva di Val Gardena,
  dove ora lavoro sulle mie opere.
- I miei lavori sono fortemente ispirati alla natura e agli eventi della vita quotidiana.
  Nel mio lavoro cerco equilibrio tra funzionalità, materia ed espressione artistica.
- Mi concentro principalmente su pezzi unici, affiancati da collaborazioni e creazioni
  realizzate su richiesta.
text_en:
- My name is Nadia Mussner, I was born in 2000 and I live in Val Gardena.
- After completing my Matura at art school, I frequented the Ortweinschule in Graz,
  where I attended the master class in art and design specialising in ceramic modelling.
  Since then, I have returned to my home village, Selva di Val Gardena, where I now
  work on my pieces.
- Nature and everyday experiences are the main sources of inspiration for my practice.
  Through my work, I aim to find a balance between functionality, materiality, and
  artistic expression.
- My work focuses primarily on unique ceramic pieces, alongside selected collaborations
  and commissioned projects.
