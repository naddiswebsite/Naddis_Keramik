backend:
  name: github
  repo: naddiswebsite/Naddis_Keramik
  branch: main
  base_url: https://square-boat-6198.naddiswebsite.workers.dev

media_library:
  name: cloudinary
  output_filename_override: true
  config:
    cloud_name: dqww81axk
    api_key: 862642912854559
    default_transformations:
      - - fetch_format: auto
          quality: auto
          width: 1800
          crop: limit

media_folder: "images/portfolio"
public_folder: "/images/portfolio"

collections:

  # ── Kategorien ──────────────────────────────────────────
  - name: kategorien
    label: Kategorien
    label_singular: Kategorie
    folder: _kategorien
    create: true
    identifier_field: name_de
    extension: yaml
    format: yaml
    fields:
      - { name: name_de, label: "Name (Deutsch)",    widget: string }
      - { name: name_it, label: "Name (Italiano)",   widget: string }
      - { name: name_en, label: "Name (Englisch)",    widget: string }
      - { name: slug,    label: "URL-Name",           widget: string, hint: "z.B. vasen, lampade — keine Leerzeichen" }
      - { name: titel_de, label: "Titel (Deutsch)",    widget: string, required: false, hint: "Optional — Überschrift über der Beschreibung" }
      - { name: titel_it, label: "Titolo (Italiano)",  widget: string, required: false }
      - { name: titel_en, label: "Title (English)",    widget: string, required: false }
      - { name: beschreibung_de, label: "Beschreibung (Deutsch)",   widget: text, required: false, hint: "Optional — wird neben den Bildern angezeigt" }
      - { name: beschreibung_it, label: "Beschreibung (Italiano)",   widget: text, required: false }
      - { name: beschreibung_en, label: "Beschreibung (Englisch)",    widget: text, required: false }
      - name: bilder
        label: Bilder
        label_singular: Bild
        widget: list
        fields:
          - { name: bild,            label: Bild,                    widget: image  }
          - { name: beschreibung_de, label: Beschreibung (Deutsch),   widget: string, required: false }
          - { name: beschreibung_it, label: Descrizione (Italiano),   widget: string, required: false }
          - { name: beschreibung_en, label: Description (English),    widget: string, required: false }

  # ── Navigation ──────────────────────────────────────────
  - name: navigation
    label: Navigation
    files:
      - name: nav
        label: Navigationsleiste
        file: _data/nav.yaml
        fields:
          - name: links
            label: Links
            label_singular: Link
            widget: list
            fields:
              - { name: titel_de, label: "Titel (Deutsch)",   widget: string }
              - { name: titel_it, label: "Titel (Italiano)",  widget: string }
              - { name: titel_en, label: "Titel (Englisch)",    widget: string }
              - { name: url,      label: URL,                  widget: string }

  # ── Fixe Seiten ─────────────────────────────────────────
  - name: fixe-seiten
    label: Fixe Seiten
    files:

      - name: about
        label: Über mich
        file: _data/about.yaml
        fields:
          - { name: foto, label: "Profilfoto", widget: image }
          - { name: text_de, label: "Text (Deutsch)",   widget: list, label_singular: Absatz, field: { name: item, label: Absatz, widget: text } }
          - { name: text_it, label: "Text (Italiano)", widget: list, label_singular: Absatz, field: { name: item, label: Absatz, widget: text } }
          - { name: text_en, label: "Text (Englisch)",   widget: list, label_singular: Absatz, field: { name: item, label: Absatz, widget: text } }
          - { name: email,     label: E-Mail,                      widget: string }
          - { name: telefon,   label: Telefon,                     widget: string }
          - { name: instagram, label: "Instagram Handle (ohne @)",  widget: string }

      - name: course
        label: Kurse
        file: _data/course.yaml
        fields:
          - { name: titel_de, label: "Seitentitel (Deutsch)",  widget: string }
          - { name: titel_it, label: "Titel (Italiano)",       widget: string }
          - { name: titel_en, label: "Seitentitel (Englisch)",    widget: string }
          - { name: text_de, label: "Text (Deutsch)",   widget: list, label_singular: Absatz, field: { name: item, label: Absatz, widget: text } }
          - { name: text_it, label: "Text (Italiano)", widget: list, label_singular: Absatz, field: { name: item, label: Absatz, widget: text } }
          - { name: text_en, label: "Text (Englisch)",   widget: list, label_singular: Absatz, field: { name: item, label: Absatz, widget: text } }

      - name: news
        label: News-Popup
        file: _data/news.yaml
        fields:
          - { name: aktiv, label: "Popup anzeigen", widget: boolean, default: false, hint: "Popup auf der Website einblenden" }
          - { name: titel_de, label: "Titel (Deutsch)",   widget: string, required: false }
          - { name: titel_it, label: "Titel (Italiano)", widget: string, required: false }
          - { name: titel_en, label: "Titel (Englisch)",   widget: string, required: false }
          - { name: text_de,  label: "Text (Deutsch)",    widget: text,   required: false }
          - { name: text_it,  label: "Text (Italiano)",  widget: text,   required: false }
          - { name: text_en,  label: "Text (Englisch)",    widget: text,   required: false }

      - name: impressum
        label: Impressum
        file: _data/imprint.yaml
        fields:
          - name: de
            label: Impressum (Deutsch)
            widget: object
            fields:
              - { name: titel, label: Seitentitel, widget: string, default: Impressum }
              - name: abschnitte
                label: Abschnitte
                label_singular: Abschnitt
                widget: list
                fields:
                  - { name: titel,  label: Überschrift, widget: string, required: false }
                  - { name: inhalt, label: Inhalt,       widget: text }
          - name: it
            label: Impressum (Italiano)
            widget: object
            fields:
              - { name: titel, label: Seitentitel, widget: string, default: Impressum }
              - name: abschnitte
                label: Abschnitte
                label_singular: Abschnitt
                widget: list
                fields:
                  - { name: titel,  label: Überschrift,    widget: string, required: false }
                  - { name: inhalt, label: Inhalt, widget: text }
          - name: en
            label: Impressum (Englisch)
            widget: object
            fields:
              - { name: titel, label: Seitentitel, widget: string, default: Imprint }
              - name: abschnitte
                label: Abschnitte
                label_singular: Abschnitt
                widget: list
                fields:
                  - { name: titel,  label: Überschrift, widget: string, required: false }
                  - { name: inhalt, label: Inhalt, widget: text }