name_de: Diplomarbeit
name_it: Lavoro di diploma
name_en: Diploma Thesis
slug: diplomarbeit
beschreibung_de: |-
  Der Titel und zugleich das Thema der Diplomarbeit lautet: „Es war einmal … (die Zeit)“. Die Arbeit stellt sich die Aufgabe, herauszufinden, wohin die Zeit verschwindet und ob es eine Möglichkeit gibt, sie wiederzufinden.
  Dabei ist die Arbeit stark vom Roman Momo von Michael Ende inspiriert. Folgende Textstellen blieben mir besonders in Erinnerung:
   „Er wurde immer nervöser und ruheloser, denn eines war seltsam: Von all der Zeit, die er einsparte, blieb ihm tatsächlich niemals etwas übrig. Sie verschwand einfach auf rätselhafte Weise und war nicht mehr da. Seine Tage wurden erst unmerklich, dann aber deutlich spürbar kürzer und kürzer. Ehe er sich’s versah, war schon wieder eine Woche, ein Monat, ein Jahr herum und noch ein Jahr und noch eines (…) Und wenn er manchmal mit Schrecken gewahr wurde, wie schnell und immer schneller seine Tage dahinrasten, dann sparte er nur umso verbissener.“ ₁
  „Niemand schien zu merken, dass er, indem er Zeit sparte, in Wirklichkeit etwas ganz anderes sparte. Keiner wollte wahrhaben, dass sein Leben immer ärmer, immer gleichförmiger und immer kälter wurde. Aber Zeit ist Leben. Und das Leben wohnt im Herzen. Und je mehr die Menschen daran sparten, desto weniger hatten sie.“ ₂
  Nach tieferer Auseinandersetzung mit dem Thema Zeit ist der Grundgedanke der Arbeit folgender: 

  Zeit mithilfe von Blumen festzuhalten, um sie anschließend an Menschen weiterzugeben. Jede Person, die eine Blume erhält, soll daran erinnert werden, sich Zeit für sich selbst und für andere zu nehmen.
  Jeder, der eine Blume bekommt, soll sie nicht behalten, sondern an eine weitere Person weitergeben.
  Das Prinzip dahinter lautet: Zeit nehmen und Zeit geben.
  Insgesamt wurden 743 Blumen in 110 Stunden gefertigt.


  ₁Ende, Michael: MOMO. Die seltsame Geschichte von den Zeit-Dieben und von dem Kind, das den Menschen die gestohlene Zeit zurückbrachte . 16. Auflage 2022. Stuttgart 1973, S.77 8
  ₂Ebenda,Ende, Michael: MOMO. S 80
beschreibung_it: |-
  Il titolo e, al tempo stesso, il tema della tesi di laurea è: «C'era una volta… (il tempo)». Il lavoro si propone di scoprire dove scompare il tempo e se esiste un modo per ritrovarlo.
  La tesi è fortemente ispirata al romanzo Momo di Michael Ende. I seguenti passaggi mi sono rimasti particolarmente impressi:
   «Diventava sempre più nervoso e irrequieto, perché c’era una cosa strana: di tutto il tempo che risparmiava, in realtà non gli rimaneva mai nulla. Scompariva semplicemente in modo misterioso e non c’era più. Le sue giornate diventavano prima impercettibilmente, poi in modo chiaramente percepibile sempre più brevi. Prima che se ne rendesse conto, era già passata un’altra settimana, un mese, un anno e poi un altro anno e un altro ancora (…) E quando a volte si rendeva conto con orrore di quanto velocemente e sempre più velocemente le sue giornate volassero via, allora risparmiava con ancora maggiore accanimento.» ₁
  «Nessuno si rendeva conto che, risparmiando tempo, in realtà risparmiava tutt'altro. Nessuno voleva ammettere che la sua vita diventava sempre più povera, sempre più monotona e sempre più fredda. Se ne rendevano conto i bambini, invece, perché nessuno aveva più tempo per loro. Ma il tempo è vita. E la vita risiede nel cuore. E quanto più ne risparmiavano, tanto meno ne avevano. » ₂
  Dopo un'approfondita riflessione sul tema del tempo, l'idea alla base di questo lavoro è la seguente: 
  L'obiettivo è quello di preservare il tempo attraverso i fiori, per poi trasmetterlo alle persone. Chi riceve un fiore deve ricordarsi di dedicare del tempo a sé stesso e agli altri. Chi riceve un fiore inoltre non deve tenerlo, ma regalarlo a qualcun altro.
  Il principio alla base è: prendersi del tempo e regalare tempo.
  In totale sono stati realizzati 743 fiori in 110 ore.


  ₁Ende, Michael: MOMO. La strana storia dei ladri di tempo e della bambina che restituì agli uomini il tempo rubato. 16ª edizione 2022. Stoccarda 1973, tradotto da deepl 
  ₂Ibid., Ende, Michael: MOMO.
beschreibung_en: |-
  The title and subject of this dissertation is: “Once upon a time …”. The aim of this work is to find out where time disappears to and whether there is a way to find it again.
  The thesis is heavily inspired by Michael Ende’s novel Momo. The following passages have stayed with me in particular:
   “He grew increasingly nervous and restless, for one thing was strange: of all the time he saved, he never actually had any left over. It simply vanished in a mysterious way and was no longer there. His days grew shorter and shorter, at first imperceptibly, but then quite noticeably. Before he knew it, another week, another month, another year had passed, and then another year and another (…) And when he sometimes realised with horror how quickly, and ever more quickly, his days were racing by, he saved all the more doggedly.” ₁
  “No one seemed to notice that, by saving time, he was in fact saving something quite different. No one wanted to admit that his life was becoming ever poorer, ever more monotonous and ever colder. But time is life. And life dwells in the heart. And the more people saved on it, the less they had.” ₂
  Following a deeper exploration of the theme of time, the fundamental idea behind this work is as follows: 
  The aim is to capture time with the help of flowers, so that it can then be passed on to people. Anyone who receives a flower should be reminded to make time for themselves and for others.
  Anyone who receives a flower should not keep it, but pass it on to someone else.
  The principle behind this is: take time and give time.
  A total of 743 flowers were made in 110 hours.


  ₁Ende, Michael: MOMO. The Strange Story of the Time Thieves and the Child Who Brought Back the Stolen Time to People. 16th edition 2022. Stuttgart 1973, translated by deepl
  ₂Ibid., Ende, Michael: MOMO.
